name: Build Container Image

"on":
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ${{ matrix.runner }}

    strategy:
      matrix:
        include:
          - arch: amd64
            os: linux
            runner: ubuntu-latest
          - arch: arm64
            os: linux
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | buildah login --username "${{ github.actor }}" --password-stdin ghcr.io

      - name: Build image
        run: buildah build --platform ${{ matrix.os }}/${{ matrix.arch }} --tag ghcr.io/${{ github.repository }}:${{ matrix.os }}-${{ matrix.arch }} --file Containerfile .

      - name: Push image
        run: buildah push ghcr.io/${{ github.repository }}:${{ matrix.os }}-${{ matrix.arch }}
  
  manifest:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | buildah login --username "${{ github.actor }}" --password-stdin ghcr.io

      - name: Create manifest
        run: |
          buildah manifest create ghcr.io/${{ github.repository }}:latest
          buildah manifest add ghcr.io/${{ github.repository }}:latest docker://ghcr.io/${{ github.repository }}:linux-amd64
          buildah manifest add ghcr.io/${{ github.repository }}:latest docker://ghcr.io/${{ github.repository }}:linux-arm64

      - name: Push manifest
        run: buildah manifest push --all ghcr.io/${{ github.repository }}:latest docker://ghcr.io/${{ github.repository }}:latest
